---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: diva-postgres-volume-claim
  labels:
    app: diva-postgres
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi

---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: diva-archive-read-only-volume-claim
  labels:
    app: diva-archive
spec:
  storageClassName: manual
  accessModes:
    - ReadOnlyMany
  resources:
    requests:
      storage: 20Gi
  volumeMode: Filesystem
  volumeName: diva-preview-archive-ro-volume
      
---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: diva-archive-read-write-volume-claim
  labels:
    app: diva-archive
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi

---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: diva-converted-files-read-write-volume-claim
  labels:
    app: diva-converted-files
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 20Gi

---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: diva-index-read-write-volume-claim
  labels:
    app: diva-index
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi

---

apiVersion: v1
kind: PersistentVolume
metadata:
  name: diva-preview-postgres-volume
  labels:
    type: local
    app: diva-preview-postgres
spec:
  storageClassName: manual
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /mnt/minikube/diva/preview/postgresql
  claimRef:
    namespace: diva-preview
    name: diva-postgres-volume-claim

---

apiVersion: v1
kind: PersistentVolume
metadata:
  name: diva-preview-archive-ro-volume
  labels:
    target: diva
spec:
#Behöver vi ange capacity?
  capacity:
    storage: 20Gi
  accessModes: ["ReadOnlyMany"]
  persistentVolumeReclaimPolicy: Retain
  volumeMode: Filesystem
  csi:
    driver: nfs.csi.k8s.io
    volumeHandle: diva-archive-ro-volume
    volumeAttributes:
      server: diva-nfs.diva-preview.svc.cluster.local
      share: /archive-read-only
      mountOptions: "nolock,vers=4,actimeo=60,lookupcache=positive,nocto,noatime,nodiratime"
  claimRef:
    namespace: diva-preview
    name: diva-archive-read-only-volume-claim
  storageClassName: manual

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: diva-preview-archive-rw-volume
  labels:
    type: local
    app: diva-preview-archive
spec:
  storageClassName: manual
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /mnt/minikube/diva/preview/archive
  claimRef:
    namespace: diva-preview
    name: diva-archive-read-write-volume-claim

---

apiVersion: v1
kind: PersistentVolume
metadata:
  name: diva-preview-converted-files-volume
  labels:
    type: local
    app: diva-preview-converted-files
spec:
  storageClassName: manual
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteMany
  hostPath:
    path: /mnt/minikube/diva/preview/convertedFiles
  claimRef:
    namespace: diva-preview
    name: diva-converted-files-read-write-volume-claim
    
---
